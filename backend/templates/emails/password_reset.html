<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Your Password</title>
</head>
<body style="font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f9fafb; margin: 0; padding: 40px 20px; color: #1f2937;">
    <div style="max-width: 500px; margin: 0 auto; background: #ffffff; border-radius: 16px; padding: 32px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03); border: 1px solid #f3f4f6;">
        <div style="text-align: center; margin-bottom: 24px;">
            <div style="display: inline-block; background-color: #e0e7ff; color: #4f46e5; padding: 12px; border-radius: 12px; font-weight: bold; font-size: 20px;">
                🚗 Carpool Platform
            </div>
        </div>
        <h2 style="font-size: 20px; font-weight: 700; text-align: center; color: #111827; margin-top: 0; margin-bottom: 8px;">Reset Your Password</h2>
        <p style="font-size: 14px; color: #4b5563; line-height: 1.5; text-align: center; margin-bottom: 24px;">We received a request to reset your password. Click the button below to choose a new password. This link is valid for 15 minutes.</p>
        <div style="text-align: center; margin: 32px 0;">
            <a href="{{ reset_link }}" style="display: inline-block; background-color: #4f46e5; color: #ffffff; padding: 12px 24px; border-radius: 8px; font-weight: 600; text-decoration: none; font-size: 14px; box-shadow: 0 2px 4px rgba(79, 70, 229, 0.2);">Reset Password</a>
        </div>
        <p style="font-size: 12px; color: #9ca3af; text-align: center; margin-top: 24px; margin-bottom: 0; line-height: 1.5;">If the button above does not work, copy and paste this link into your browser:<br><a href="{{ reset_link }}" style="color: #4f46e5; text-decoration: underline;">{{ reset_link }}</a></p>
    </div>
</body>
</html>
