<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Your Email</title>
</head>
<body style="font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f9fafb; margin: 0; padding: 40px 20px; color: #1f2937;">
    <div style="max-width: 500px; margin: 0 auto; background: #ffffff; border-radius: 16px; padding: 32px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03); border: 1px solid #f3f4f6;">
        <div style="text-align: center; margin-bottom: 24px;">
            <div style="display: inline-block; background-color: #e0e7ff; color: #4f46e5; padding: 12px; border-radius: 12px; font-weight: bold; font-size: 20px;">
                🚗 Carpool Platform
            </div>
        </div>
        <h2 style="font-size: 20px; font-weight: 700; text-align: center; color: #111827; margin-top: 0; margin-bottom: 8px;">Confirm your email address</h2>
        <p style="font-size: 14px; color: #4b5563; line-height: 1.5; text-align: center; margin-bottom: 24px;">Please use the verification code below to complete your registration. This code is valid for 10 minutes.</p>
        <div style="font-size: 32px; font-weight: 800; text-align: center; padding: 16px; background-color: #f3f4f6; border-radius: 12px; margin: 24px 0; letter-spacing: 6px; color: #4f46e5; border: 1px solid #e5e7eb;">
            {{ otp }}
        </div>
        <p style="font-size: 12px; color: #9ca3af; text-align: center; margin-top: 24px; margin-bottom: 0; line-height: 1.5;">If you did not request this verification code, you can safely ignore this email.</p>
    </div>
</body>
</html>
